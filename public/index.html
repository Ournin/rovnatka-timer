<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rovnátka časovač</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Rovnátka <span class="emoji">🦷</span></h1>
      <button id="goalBtn" class="goal-pill" title="Změnit denní cíl">
        Cíl: <span id="goalLabel">20</span> h ✏️
      </button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statToday">0.0 h</div>
        <div class="stat-label">Dnes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statStreak">0 🔥</div>
        <div class="stat-label">Aktuální série</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statBestStreak">0</div>
        <div class="stat-label">Nejdelší série</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0 h</div>
        <div class="stat-label">Celkem</div>
      </div>
    </section>

    <section class="main-card">
      <div class="ring-wrap">
        <svg class="ring" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="95"></circle>
          <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="95"></circle>
        </svg>
        <div class="ring-center">
          <div class="timer" id="timer">00:00:00</div>
          <div class="ring-pct" id="ringPct">0 %</div>
        </div>
      </div>
      <button id="toggleBtn" class="toggle-btn">Start</button>
    </section>

    <section class="history-card">
      <h2>Posledních 14 dní</h2>
      <div class="bar-chart" id="barChart"></div>

      <h2>Celá historie</h2>
      <ul id="history" class="history"></ul>
    </section>
  </div>

  <div id="goalModal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Denní cíl</h3>
      <p class="modal-sub">Kolik hodin denně chceš nosit rovnátka?</p>
      <input id="goalInput" type="number" min="1" max="24" step="0.5" />
      <div class="modal-actions">
        <button id="goalCancel" class="btn-secondary">Zrušit</button>
        <button id="goalSave" class="btn-primary">Uložit</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
